services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://api.privetilya.online/api}
        VITE_WEB_SOCKET_URL: ${VITE_WEB_SOCKET_URL:-wss://ws.privetilya.online}
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    restart: unless-stopped
    env_file:
      - .env
